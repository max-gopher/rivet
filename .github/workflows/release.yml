name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            mold

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (Linux)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Debug - show Linux bundle
        run: |
          echo "=== Bundle contents ==="
          find target/release/bundle -type f 2>/dev/null | sort || echo "bundle not found"
          echo "=== Looking for .deb ==="
          find target/release -name "*.deb" 2>/dev/null || echo "No .deb found"
          echo "=== Looking for .AppImage ==="
          find target/release -name "*.AppImage" 2>/dev/null || echo "No AppImage found"

      - name: Prepare Linux artifacts
        run: |
          mkdir -p release-artifacts
          find target/release -name "*.deb" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find target/release -name "*.AppImage" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find target/release -name "*.rpm" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          echo "=== Linux artifacts ==="
          ls -la release-artifacts/ || echo "No artifacts"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-linux
          path: release-artifacts/
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (Windows)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Debug - show Windows bundle
        shell: bash
        run: |
          echo "=== Bundle contents ==="
          find target/release/bundle -type f 2>/dev/null | sort || echo "bundle not found"
          echo "=== Looking for .msi ==="
          find target/release -name "*.msi" 2>/dev/null || echo "No .msi found"
          echo "=== Looking for .exe ==="
          find target/release -name "*.exe" 2>/dev/null | head -10 || echo "No .exe found"

      - name: Prepare Windows artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find target/release -name "*.msi" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find target/release -name "*-setup.exe" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find target/release -name "*.exe" -path "*/bundle/nsis/*" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          echo "=== Windows artifacts ==="
          ls -la release-artifacts/ || echo "No artifacts"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-windows
          path: release-artifacts/
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (macOS)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Debug - show macOS bundle
        run: |
          echo "=== Bundle contents ==="
          find target/release/bundle -type f 2>/dev/null | sort || echo "bundle not found"
          echo "=== Looking for .dmg ==="
          find target/release -name "*.dmg" 2>/dev/null || echo "No .dmg found"
          echo "=== Looking for .app ==="
          find target/release -name "*.app" 2>/dev/null | head -5 || echo "No .app found"

      - name: Prepare macOS artifacts
        run: |
          mkdir -p release-artifacts
          find target/release -name "*.dmg" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          # Если есть .app - архивируем
          APP_PATH=$(find target/release -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found APP: $APP_PATH"
            (cd "$(dirname "$APP_PATH")" && zip -r "../../../release-artifacts/$(basename "$APP_PATH").zip" "$(basename "$APP_PATH")")
          fi
          echo "=== macOS artifacts ==="
          ls -la release-artifacts/ || echo "No artifacts"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-macos
          path: release-artifacts/
          if-no-files-found: ignore

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          echo "=== All downloaded files ==="
          find artifacts -type f | sort
          echo "============================"
          echo "=== Linux ==="
          ls -la artifacts/rivet-linux/ 2>/dev/null || echo "Folder not found"
          echo "=== Windows ==="
          ls -la artifacts/rivet-windows/ 2>/dev/null || echo "Folder not found"
          echo "=== macOS ==="
          ls -la artifacts/rivet-macos/ 2>/dev/null || echo "Folder not found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/rivet-linux/*
            artifacts/rivet-windows/*
            artifacts/rivet-macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}