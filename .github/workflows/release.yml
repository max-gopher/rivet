name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install mold (optional linker)
        run: |
          sudo apt-get install -y mold || true

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/gui
          tagName: ${{ github.ref_name }}
          releaseId: none

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-linux-${{ github.ref_name }}
          path: crates/gui/target/release/bundle/**/*