name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            mold

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (Linux)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Prepare Linux artifacts
        run: |
          mkdir -p release-artifacts
          find target/release/bundle -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} release-artifacts/ \;
          echo "=== Linux artifacts ==="
          ls -la release-artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-linux
          path: release-artifacts/*
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (Windows)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Prepare Windows artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find target/release/bundle -type f \( -name "*.msi" -o -name "*-setup.exe" \) -exec cp {} release-artifacts/ \;
          echo "=== Windows artifacts ==="
          ls -la release-artifacts/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-windows
          path: release-artifacts/*
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install macOS dependencies
        run: |
          brew install create-dmg

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (macOS)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Prepare macOS artifacts
        run: |
          mkdir -p release-artifacts
          
          # Копируем DMG
          if ls target/release/bundle/dmg/*.dmg 1> /dev/null 2>&1; then
            cp target/release/bundle/dmg/*.dmg release-artifacts/
          fi
          
          # Опционально: архивируем APP
          if [ -d "target/release/bundle/macos/rivet.app" ]; then
            zip -r release-artifacts/rivet.app.zip target/release/bundle/macos/rivet.app
          fi
          
          echo "=== macOS artifacts ==="
          ls -la release-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-macos
          path: release-artifacts/*
          if-no-files-found: warn

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          continue-on-error: true

      - name: List downloaded files
        run: |
          echo "=== All downloaded artifacts ==="
          find artifacts -type f 2>/dev/null | sort || echo "No artifacts found"
          echo ""
          echo "=== Linux ==="
          ls -la artifacts/rivet-linux/ 2>/dev/null || echo "No Linux artifacts"
          echo ""
          echo "=== Windows ==="
          ls -la artifacts/rivet-windows/ 2>/dev/null || echo "No Windows artifacts"
          echo ""
          echo "=== macOS ==="
          ls -la artifacts/rivet-macos/ 2>/dev/null || echo "No macOS artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/rivet-linux/*
            artifacts/rivet-windows/*
            artifacts/rivet-macos/*