name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            mold \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app
        run: |
          cd crates/gui
          cargo tauri build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-linux-${{ github.ref_name }}
          path: crates/gui/target/release/bundle/**/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app
        run: |
          cd crates/gui
          cargo tauri build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-windows-${{ github.ref_name }}
          path: crates/gui/target/release/bundle/**/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app
        run: |
          cd crates/gui
          cargo tauri build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-macos-${{ github.ref_name }}
          path: |
            crates/gui/target/release/bundle/dmg/*.dmg
            crates/gui/target/release/bundle/macos/*.app