name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            mold

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (Linux GUI)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Build CLI
        env:
          RUSTFLAGS: "-A dead_code"
        run: |
          cargo build --release -p rivet-cli

      - name: Prepare Linux artifacts
        run: |
          mkdir -p release-artifacts
          
          # GUI
          if [ -f "target/release/bundle/deb/rivet_0.1.0_amd64.deb" ]; then
            cp target/release/bundle/deb/rivet_0.1.0_amd64.deb release-artifacts/rivet_0.1.0_Linux.deb
          fi
          
          if [ -f "target/release/bundle/rpm/rivet-0.1.0-1.x86_64.rpm" ]; then
            cp target/release/bundle/rpm/rivet-0.1.0-1.x86_64.rpm release-artifacts/rivet_0.1.0_Linux.rpm
          fi
          
          if [ -f "target/release/bundle/appimage/rivet_0.1.0_amd64.AppImage" ]; then
            cp target/release/bundle/appimage/rivet_0.1.0_amd64.AppImage release-artifacts/rivet_0.1.0_Linux.AppImage
          fi
          
          # CLI
          if [ -f "target/release/rivet-cli" ]; then
            cp target/release/rivet-cli release-artifacts/rivet-cli_0.1.0_Linux
            chmod +x release-artifacts/rivet-cli_0.1.0_Linux
          fi
          
          echo "=== Linux artifacts ==="
          ls -la release-artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-linux
          path: release-artifacts/*
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (Windows GUI)
        run: |
          cd crates/gui
          cargo tauri build

      - name: Build CLI (with dead_code allowed)
        shell: bash
        env:
          RUSTFLAGS: "-A dead_code"
        run: |
          cargo build --release -p rivet-cli

      - name: Prepare Windows artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          
          # GUI
          if [ -f "target/release/bundle/msi/rivet_0.1.0_x64_en-US.msi" ]; then
            cp target/release/bundle/msi/rivet_0.1.0_x64_en-US.msi release-artifacts/rivet_0.1.0_Windows.msi
          fi
          
          if [ -f "target/release/bundle/nsis/rivet_0.1.0_x64-setup.exe" ]; then
            cp target/release/bundle/nsis/rivet_0.1.0_x64-setup.exe release-artifacts/rivet_0.1.0_Windows.exe
          fi
          
          # CLI
          if [ -f "target/release/rivet-cli.exe" ]; then
            cp target/release/rivet-cli.exe release-artifacts/rivet-cli_0.1.0_Windows.exe
          fi
          
          echo "=== Windows artifacts ==="
          ls -la release-artifacts/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-windows
          path: release-artifacts/*
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install macOS dependencies
        run: |
          brew install create-dmg

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (macOS GUI Universal)
        run: |
          cd crates/gui
          cargo tauri build --target universal-apple-darwin

      - name: Build CLI for Apple Silicon
        env:
          RUSTFLAGS: "-A dead_code"
        run: |
          cargo build --release -p rivet-cli --target aarch64-apple-darwin

      - name: Build CLI for Intel
        env:
          RUSTFLAGS: "-A dead_code"
        run: |
          cargo build --release -p rivet-cli --target x86_64-apple-darwin

      - name: Create Universal CLI Binary
        run: |
          mkdir -p release-artifacts
          
          if [ -f "target/aarch64-apple-darwin/release/rivet-cli" ] && [ -f "target/x86_64-apple-darwin/release/rivet-cli" ]; then
            lipo -create \
              target/aarch64-apple-darwin/release/rivet-cli \
              target/x86_64-apple-darwin/release/rivet-cli \
              -output release-artifacts/rivet-cli_0.1.0_MacOS_universal
            chmod +x release-artifacts/rivet-cli_0.1.0_MacOS_universal
            echo "Universal CLI created successfully"
          else
            echo "CLI binaries not found, skipping universal build"
            if [ -f "target/aarch64-apple-darwin/release/rivet-cli" ]; then
              cp target/aarch64-apple-darwin/release/rivet-cli release-artifacts/rivet-cli_0.1.0_MacOS_AppleSilicon
              chmod +x release-artifacts/rivet-cli_0.1.0_MacOS_AppleSilicon
            fi
            if [ -f "target/x86_64-apple-darwin/release/rivet-cli" ]; then
              cp target/x86_64-apple-darwin/release/rivet-cli release-artifacts/rivet-cli_0.1.0_MacOS_Intel
              chmod +x release-artifacts/rivet-cli_0.1.0_MacOS_Intel
            fi
          fi

      - name: Prepare macOS GUI artifacts
        run: |
          # GUI - Universal DMG
          if [ -f "target/universal-apple-darwin/release/bundle/dmg/rivet_0.1.0_universal.dmg" ]; then
            cp target/universal-apple-darwin/release/bundle/dmg/rivet_0.1.0_universal.dmg release-artifacts/rivet_0.1.0_MacOS.dmg
          fi
          
          # GUI - Universal APP
          if [ -d "target/universal-apple-darwin/release/bundle/macos/rivet.app" ]; then
            cd target/universal-apple-darwin/release/bundle/macos/
            zip -r ../../../../../release-artifacts/rivet_0.1.0_MacOS.app.zip rivet.app
            cd ../../../../../
          fi
          
          echo "=== macOS artifacts ==="
          ls -la release-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-macos
          path: release-artifacts/*
          if-no-files-found: warn

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          continue-on-error: true

      - name: List downloaded files
        run: |
          echo "=== All downloaded artifacts ==="
          find artifacts -type f 2>/dev/null | sort || echo "No artifacts found"
          echo ""
          echo "=== Linux ==="
          ls -la artifacts/rivet-linux/ 2>/dev/null || echo "No Linux artifacts"
          echo ""
          echo "=== Windows ==="
          ls -la artifacts/rivet-windows/ 2>/dev/null || echo "No Windows artifacts"
          echo ""
          echo "=== macOS ==="
          ls -la artifacts/rivet-macos/ 2>/dev/null || echo "No macOS artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*