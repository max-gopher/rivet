name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ========== 1. Проверки (линтер, тесты) ==========
  check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  # ========== 2. Сборка CLI ==========
  build-cli:
    runs-on: ubuntu-24.04
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build -p rivet-cli --release

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivet-cli-linux
          path: target/release/rivet

  # ========== 3. Сборка GUI (Tauri) ==========
  build-gui:
    runs-on: ubuntu-22.04  # ← Важно! Ubuntu 22.04 для совместимости
    needs: check
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            crates/gui/node_modules
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/package-lock.json') }}

      - name: Build frontend (Svelte)
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app (with bUndles)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/gui
          tagName: v${{ github.ref_name }}
          releaseDraftName: "Release v${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."

      - name: Upload GUI artifacts (binaries)
        uses: actions/upload-artifact@v4
        with:
          name: rivet-gui-linux
          path: |
            crates/gui/target/release/bundle/**/*

  # ========== 4. Windows сборка ==========
  build-windows:
    runs-on: windows-latest
    needs: check
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/gui
          tagName: v${{ github.ref_name }}
          releaseDraftName: "Release v${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-gui-windows
          path: |
            crates/gui/target/release/bundle/**/*

  # ========== 5. macOS сборка ==========
  build-macos:
    runs-on: macos-latest
    needs: check
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: |
          cd crates/gui
          npm install
          npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/gui
          tagName: v${{ github.ref_name }}
          releaseDraftName: "Release v${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-gui-macos
          path: |
            crates/gui/target/release/bundle/**/*